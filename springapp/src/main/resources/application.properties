spring.application.name=neo

# Render port binding
server.port=${PORT:8080}

# Aiven MySQL datasource (env-driven; no localhost fallback)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP production-safe settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.connection-test-query=SELECT 1
# Prevent hard fail on transient DB/network startup race in cloud deploys
spring.datasource.hikari.initialization-fail-timeout=0

# Aiven SSL compatibility
spring.datasource.hikari.data-source-properties.sslMode=REQUIRED
spring.datasource.hikari.data-source-properties.enabledTLSProtocols=TLSv1.2,TLSv1.3
spring.datasource.hikari.data-source-properties.allowPublicKeyRetrieval=true
spring.datasource.hikari.data-source-properties.serverTimezone=UTC

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# CORS for Firebase frontend(s)
spring.web.cors.allowed-origins=${SPRING_WEB_CORS_ALLOWED_ORIGINS}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

# Gmail API (OAuth2 refresh token) — when GMAIL_CLIENT_ID is set, OTP mail uses Gmail REST API, not SMTP
# Env: GMAIL_CLIENT_ID, GMAIL_CLIENT_SECRET, GMAIL_REFRESH_TOKEN, GMAIL_FROM_EMAIL (must match the mailbox that authorized the refresh token)

# SMTP (Gmail App Password) configuration — used when Gmail API env is not fully set
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Health endpoint helps Render detect healthy service
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Admin Face ID: when false, backend skips face verification and frontend hides Face ID UI
app.admin.face-auth-enabled=${ADMIN_FACE_AUTH_ENABLED:true}

# Temporary admin face-auth bypass (set true only during DB migration/recovery)
app.admin.face-auth-bypass=${ADMIN_FACE_AUTH_BYPASS:false}