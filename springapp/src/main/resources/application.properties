spring.application.name=neo

# Server configuration
# Default to 8080 for local development, use PORT environment variable if set (for production)
server.port=${PORT:8080}

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/springapp
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Database connection settings for better persistence
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000

# JPA settings for better data handling
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Enable Swagger OpenAPI generation
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# CORS Configuration for Local Development
# Allow Angular frontend running on localhost:4200
# For production, set SPRING_WEB_CORS_ALLOWED_ORIGINS environment variable
spring.web.cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200

# JVM Memory Settings (recommended for production)
# These should be set via JAVA_OPTS or in startup script:
# -Xms512m -Xmx2048m -XX:MaxMetaspaceSize=512m
# For development, you can set them in your IDE run configuration

# Logging - Reduced from DEBUG to INFO to save memory
logging.level.org.springframework.web=INFO
logging.level.com.neo.springapp=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# File upload size limits to prevent OOM
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# Jackson JSON serialization - use ISO strings for dates
spring.jackson.serialization.write-dates-as-timestamps=false

# Tomcat thread and connection limits
server.tomcat.threads.max=100
server.tomcat.max-connections=5000

# Email Configuration (for OTP)
# Uncomment and configure these properties to enable email sending
# For Gmail, use an App Password instead of your regular password
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=sairohith669@gmail.com
