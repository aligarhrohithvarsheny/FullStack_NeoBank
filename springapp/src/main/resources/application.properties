spring.application.name=neo

# Render port binding — MUST use PORT env var (Render sets this dynamically)
server.port=${PORT:8080}

# Aiven MySQL datasource (env-driven; no localhost fallback)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP — tuned for 512 MB Render instance (3 connections ≈ 15–30 MB)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=540000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.leak-detection-threshold=0
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.initialization-fail-timeout=0

# Aiven SSL compatibility
spring.datasource.hikari.data-source-properties.sslMode=REQUIRED
spring.datasource.hikari.data-source-properties.enabledTLSProtocols=TLSv1.2,TLSv1.3
spring.datasource.hikari.data-source-properties.allowPublicKeyRetrieval=true
spring.datasource.hikari.data-source-properties.serverTimezone=UTC

# JPA / Hibernate — validate/update schema; avoid disabling JDBC metadata (breaks validate + runtime queries)
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false

# Startup speed
spring.main.banner-mode=off
spring.jmx.enabled=false

# Tomcat thread pool — default 200 threads wastes memory on small instances
server.tomcat.threads.max=40
server.tomcat.threads.min-spare=4
server.tomcat.max-connections=80
server.tomcat.accept-count=10

# Scheduler pool
spring.task.scheduling.pool.size=2

# CORS for Firebase frontend(s) and the Render deployment
spring.web.cors.allowed-origins=https://neo-bank-669.web.app,https://neo-bank-669.firebaseapp.com,https://fullstack-neobank.onrender.com,http://localhost:4200,http://localhost:4000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

# Gmail API (OAuth2 refresh token) — when GMAIL_CLIENT_ID is set, OTP mail uses Gmail REST API, not SMTP
# Env: GMAIL_CLIENT_ID, GMAIL_CLIENT_SECRET, GMAIL_REFRESH_TOKEN, GMAIL_FROM_EMAIL

# SMTP (Gmail App Password) — used when Gmail API env is not fully set
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Actuator — minimal exposure for Render health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,db
management.endpoint.health.show-details=never
management.metrics.export.prometheus.enabled=false
management.health.diskspace.enabled=false

# Swagger / OpenAPI — disabled by default on cloud (set SWAGGER_ENABLED=true to enable)
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}

# Logging — reduce startup noise
logging.level.root=${LOG_LEVEL_ROOT:WARN}
logging.level.com.neo.springapp=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# Multipart uploads (bank forms, documents, etc.)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

app.admin.face-auth-enabled=${ADMIN_FACE_AUTH_ENABLED:false}
app.admin.face-auth-bypass=${ADMIN_FACE_AUTH_BYPASS:false}
