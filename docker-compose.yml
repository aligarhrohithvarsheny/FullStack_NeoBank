version: '3.8'
services:
  backend:
    build: ./springapp
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - "JAVA_TOOL_OPTIONS=-Xms1g -Xmx4g -XX:MaxMetaspaceSize=256m"

  frontend:
    build: ./angularapp
    ports:
      - "4000:4000"
    environment:
      - BACKEND_API_URL=http://backend:8080
    depends_on:
      - backend
