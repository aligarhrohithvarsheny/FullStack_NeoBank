<div class="logout-container">
  <div class="logout-content">
    <!-- Left Side - Megaphone Graphic -->
    <div class="megaphone-section">
      <div class="megaphone-graphic">
        <div class="hand">
          <div class="sleeve"></div>
        </div>
        <div class="megaphone">
          <div class="megaphone-body"></div>
          <div class="megaphone-rim"></div>
        </div>
      </div>
    </div>

    <!-- Right Side - Speech Bubble -->
    <div class="speech-bubble">
      <div class="thumbs-up-icon">👍</div>
      <h1 class="thank-you-text">Thank you for using neobank</h1>
      <p class="signoff-text">You have successfully signed off</p>
      <div class="divider"></div>
      <p class="security-text">For security reasons,</p>
      <p class="security-text">please close the current browser window.</p>
      
      <button class="close-window-btn" (click)="goToLogin()">Go to Login</button>
    </div>
  </div>

  <!-- Bottom Footer -->
  <div class="footer">
    <div class="footer-logo">
      <span class="footer-bank-name">NEOBANK</span>
      <span class="footer-tagline">YOUR PERFECT BANKING PARTNER</span>
    </div>
  </div>
</div>
